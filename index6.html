<!DOCTYPE html>
<html>
<head>
  <title>Emergency Location Request (PoC)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
      background: #f8f8f8;
    }
    button {
      background: red;
      color: white;
      font-size: 20px;
      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      margin: 10px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #333;
      word-break: break-word;
      white-space: pre-line;
      text-align: left;
      display: inline-block;
      max-width: 90%;
    }
    #copyBtn {
      background: blue;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/open-location-code@1.1.4/openlocationcode.min.js"></script>
</head>
<body>

<h2>🚨 Emergency Location Request</h2>
<p>112 Emergency Services has requested your location.</p>

<button onclick="getLocation()">Share My Location</button>
<p id="status"></p>

<script>
function getLocation() {
  const status = document.getElementById("status");
  status.innerText = "Getting precise location...";

  const loadingTimeout = setTimeout(() => {
    status.innerText = "⏳ Still getting location…\nMove near a window or enable GPS and tap Retry.";
  }, 12000);

  navigator.geolocation.getCurrentPosition(
    function(position) {
      clearTimeout(loadingTimeout);

      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy;
      const time = new Date().toLocaleString();

      const fullPlus = OpenLocationCode.encode(lat, lon);
      const shortPlus = OpenLocationCode.shorten(fullPlus, 28.7041, 77.1025); // example reference

      const urlParams = new URLSearchParams(window.location.search);
      const reqId = urlParams.get('req') || "NO_ID";

      const message = 
`EMERGENCY LOCATION
REQID: ${reqId}
Lat: ${lat}
Lon: ${lon}
Plus Code: ${shortPlus} Delhi
Accuracy: ±${acc}m
Time: ${time}`;

      // Show preview
      status.innerHTML =
`Lat: ${lat}, Lon: ${lon} (±${acc}m)
Plus Code: ${shortPlus} Delhi
Time: ${time}`;

      // Add Copy Plus Code button
      if (!document.getElementById("copyBtn")) {
        const copyBtn = document.createElement("button");
        copyBtn.id = "copyBtn";
        copyBtn.innerText = "Copy Plus Code";
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(shortPlus + " Delhi")
            .then(() => alert("Plus Code copied!"))
            .catch(() => alert("Failed to copy."));
        };
        document.body.appendChild(copyBtn);
      }

      // Ask to send SMS
      if (confirm("Do you want to share your location via SMS?")) {
        window.location.href = `sms:+918076529930?body=${encodeURIComponent(message)}`;
      }
    },
    function(error) {
      clearTimeout(loadingTimeout);
      status.innerText = "❌ Location failed. Please enable GPS and tap Retry.";

      if (!document.getElementById("retryBtn")) {
        const retryBtn = document.createElement("button");
        retryBtn.innerText = "Retry";
        retryBtn.id = "retryBtn";
        retryBtn.onclick = getLocation;
        document.body.appendChild(retryBtn);
      }
    },
    {
      enableHighAccuracy: true,
      timeout: 15000,
      maximumAge: 0
    }
  );
}
</script>

</body>
</html>
